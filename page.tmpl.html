<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waitly · Boligforeninger</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #f4f6fb;
    --panel: #ffffff;
    --ink: #1c2433;
    --muted: #6b7488;
    --line: #e6e9f2;
    --brand: #3056d3;
    --brand-d: #1f3aa6;
    --accent: #0ea66f;
    --warn: #d97706;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--ink); }

  header {
    background: linear-gradient(135deg, var(--brand-d), var(--brand));
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 1px 10px rgba(20,30,60,.25);
    position: relative;
    z-index: 500;
  }
  header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -.4px; }
  header .sub { font-size: .8rem; opacity: .8; margin-top: 1px; }
  header .stats { margin-left: auto; display: flex; gap: 10px; }
  .stat {
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 12px;
    padding: 6px 14px;
    text-align: center;
    min-width: 78px;
  }
  .stat b { display: block; font-size: 1.15rem; font-weight: 700; line-height: 1.1; }
  .stat span { font-size: .68rem; text-transform: uppercase; letter-spacing: .5px; opacity: .85; }

  .layout { display: grid; grid-template-columns: 400px 1fr; height: calc(100vh - 70px); }

  .panel { background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }

  .controls { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .45; }
  #search {
    width: 100%; border: 1px solid var(--line); border-radius: 10px;
    padding: 9px 12px 9px 34px; font-size: .92rem; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  #search:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(48,86,211,.12); }
  .row { display: flex; gap: 8px; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: .66rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  select {
    border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; font-size: .85rem;
    background: #fff; outline: none; cursor: pointer; transition: border-color .15s;
  }
  select:focus { border-color: var(--brand); }
  .count-bar { font-size: .78rem; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
  .reset { background: none; border: none; color: var(--brand); font-size: .78rem; cursor: pointer; font-weight: 600; }
  .reset:hover { text-decoration: underline; }

  .list { overflow-y: auto; flex: 1; }
  .card { padding: 13px 16px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s; }
  .card:hover { background: #f5f8ff; }
  .card.active { background: #eef3ff; box-shadow: inset 3px 0 0 var(--brand); }
  .card-name { font-weight: 650; font-size: .95rem; color: var(--ink); }
  .card-addr { font-size: .8rem; color: var(--muted); margin-top: 2px; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .pill { display: inline-flex; align-items: center; gap: 4px; border-radius: 999px; padding: 2px 9px; font-size: .73rem; font-weight: 600; background: #eef1f8; color: #4a5573; }
  .pill.units { background: #eaf1ff; color: var(--brand); }
  .pill.rent { background: #e9f8f1; color: var(--accent); }
  .pill.buy { background: #fff4e6; color: var(--warn); }
  .pill.rooms { background: #f1edff; color: #6d4bd1; }
  .pill.wait { background: #fdeaf0; color: #c2255c; }

  #map { height: 100%; z-index: 0; }
  .empty { padding: 48px 24px; text-align: center; color: var(--muted); font-size: .9rem; }

  .leaflet-popup-content { margin: 12px 14px; }
  .pop h3 { font-size: 1rem; color: var(--brand-d); margin-bottom: 6px; }
  .pop p { font-size: .82rem; color: #404a5e; margin: 3px 0; }
  .pop a { display: inline-block; margin-top: 8px; background: var(--brand); color: #fff; padding: 6px 12px; border-radius: 8px; text-decoration: none; font-size: .8rem; font-weight: 600; }
  .pop a:hover { background: var(--brand-d); }
  .dot { width: 16px; height: 16px; background: var(--brand); border: 2.5px solid #fff; border-radius: 50%; box-shadow: 0 1px 5px rgba(0,0,0,.45); }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: 320px 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--line); }
    header .stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,.16)"/>
    <path d="M16 6.5l8 6.8V25H8V13.3l8-6.8z" fill="#fff"/>
    <rect x="13.5" y="17" width="5" height="8" fill="var(--brand)"/>
  </svg>
  <div>
    <h1>Waitly Boligforeninger</h1>
    <div class="sub">Andelsboligforeninger nær <b>{{.Source}}</b></div>
  </div>
  <div class="stats">
    <div class="stat"><b>{{.Total}}</b><span>Foreninger</span></div>
    <div class="stat"><b>{{.WithCoords}}</b><span>På kort</span></div>
  </div>
</header>

<div class="layout">
  <div class="panel">
    <div class="controls">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search" placeholder="Søg navn, adresse eller by…" autocomplete="off">
      </div>
      <div class="row">
        <div class="field">
          <label for="sortBy">Sortér</label>
          <select id="sortBy">
            <option value="name">Navn (A–Å)</option>
            <option value="name_desc">Navn (Å–A)</option>
            <option value="ext_desc">Længst venteliste</option>
            <option value="ext">Korteste venteliste</option>
            <option value="units_desc">Flest enheder</option>
            <option value="units">Færrest enheder</option>
            <option value="rent">Husleje lavest</option>
            <option value="rent_desc">Husleje højest</option>
            <option value="buy">Pris lavest</option>
            <option value="buy_desc">Pris højest</option>
          </select>
        </div>
        <div class="field">
          <label for="filterCity">By</label>
          <select id="filterCity"><option value="">Alle byer</option></select>
        </div>
        <div class="field">
          <label for="filterRooms">Værelser</label>
          <select id="filterRooms">
            <option value="">Alle</option>
            <option value="1">1+ vær.</option>
            <option value="2">2+ vær.</option>
            <option value="3">3+ vær.</option>
            <option value="4">4+ vær.</option>
          </select>
        </div>
      </div>
      <div class="count-bar">
        <span id="countLabel"></span>
        <button class="reset" id="resetBtn">Nulstil filtre</button>
      </div>
    </div>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<script>
const RAW = {{.RawJSON}};

const $ = id => document.getElementById(id);

// ---- helpers ----
function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function num(n) { return Number(n).toLocaleString('da-DK'); }
function curr(p) { return p.currency || 'kr'; }
function rangeStr(lo, hi, suffix) {
  if (lo == null && hi == null) return null;
  if (lo != null && hi != null && lo !== hi) return num(lo) + '–' + num(hi) + ' ' + suffix;
  return num(lo != null ? lo : hi) + ' ' + suffix;
}
function buyStr(p)  { return rangeStr(p.buyMin, p.buyMax, curr(p)); }
function rentStr(p) { var r = rangeStr(p.rentMin, p.rentMax, curr(p) + '/md'); return r; }
function roomsStr(p) {
  if (p.roomsMin == null && p.roomsMax == null) return null;
  if (p.roomsMin != null && p.roomsMax != null && p.roomsMin !== p.roomsMax) return p.roomsMin + '–' + p.roomsMax + ' vær.';
  return (p.roomsMin != null ? p.roomsMin : p.roomsMax) + ' vær.';
}

// ---- city filter options ----
const cities = [...new Set(RAW.map(p => p.city).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'da'));
cities.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  $('filterCity').appendChild(o);
});

// ---- map ----
const map = L.map('map', { scrollWheelZoom: true }).setView([56, 11.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19
}).addTo(map);

const icon = L.divIcon({ className: '', html: '<div class="dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });

const markers = {};
let activeId = null;

RAW.forEach(p => {
  if (p.lat == null || p.lng == null) return;
  const m = L.marker([p.lat, p.lng], { icon });
  const parts = [];
  parts.push('<div class="pop"><h3>' + escHtml(p.name) + '</h3>');
  parts.push('<p>📍 ' + escHtml([p.address, p.zip, p.city].filter(Boolean).join(', ')) + '</p>');
  if (p.extTotal != null) {
    var w = '⏳ Ekstern venteliste: <b>' + num(p.extTotal) + '</b>';
    if (p.extActive != null) w += ' (' + num(p.extActive) + ' aktive)';
    parts.push('<p>' + w + '</p>');
  }
  if (p.units != null) parts.push('<p>🏢 ' + num(p.units) + ' enheder</p>');
  const rs = roomsStr(p); if (rs) parts.push('<p>🚪 ' + escHtml(rs) + '</p>');
  const rt = rentStr(p);  if (rt) parts.push('<p>💸 Husleje: ' + escHtml(rt) + '</p>');
  const bu = buyStr(p);   if (bu) parts.push('<p>💰 Andelspris: ' + escHtml(bu) + '</p>');
  if (p.url) parts.push('<a href="' + escHtml(p.url) + '" target="_blank" rel="noopener">' + escHtml(p.signUpText || 'Tilmeld venteliste') + ' →</a>');
  parts.push('</div>');
  m.bindPopup(parts.join(''));
  m.on('click', () => selectItem(p.id, false));
  markers[p.id] = m;
});

// ---- rendering ----
function selectItem(id, fly) {
  activeId = id;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', Number(c.dataset.id) === id));
  const el = document.querySelector('.card[data-id="' + id + '"]');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  const m = markers[id];
  if (m) {
    if (fly) map.flyTo(m.getLatLng(), Math.max(map.getZoom(), 14), { duration: .6 });
    m.openPopup();
  }
}

function cardHtml(p) {
  const pills = [];
  if (p.extTotal != null) pills.push('<span class="pill wait">⏳ ' + num(p.extTotal) + ' på venteliste</span>');
  if (p.units != null) pills.push('<span class="pill units">🏢 ' + num(p.units) + ' enheder</span>');
  const rs = roomsStr(p); if (rs) pills.push('<span class="pill rooms">🚪 ' + escHtml(rs) + '</span>');
  const rt = rentStr(p);  if (rt) pills.push('<span class="pill rent">💸 ' + escHtml(rt) + '</span>');
  const bu = buyStr(p);   if (bu) pills.push('<span class="pill buy">💰 ' + escHtml(bu) + '</span>');
  return '<div class="card' + (p.id === activeId ? ' active' : '') + '" data-id="' + p.id + '">' +
    '<div class="card-name">' + escHtml(p.name) + '</div>' +
    '<div class="card-addr">' + escHtml([p.address, p.zip, p.city].filter(Boolean).join(', ')) + '</div>' +
    (pills.length ? '<div class="pills">' + pills.join('') + '</div>' : '') +
    '</div>';
}

function renderList(items) {
  const list = $('list');
  $('countLabel').textContent = items.length + ' af ' + RAW.length + ' vist';
  if (!items.length) { list.innerHTML = '<div class="empty">Ingen foreninger matcher dine filtre.</div>'; return; }
  list.innerHTML = items.map(cardHtml).join('');
  list.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => selectItem(Number(c.dataset.id), true));
  });
}

// ---- filtering & sorting ----
function sortVal(p, key) {
  if (key === 'ext')   return p.extTotal;
  if (key === 'units') return p.units;
  if (key === 'rent')  return p.rentMin != null ? p.rentMin : p.rentMax;
  if (key === 'buy')   return p.buyMin != null ? p.buyMin : p.buyMax;
  return null;
}

function apply() {
  const q = $('search').value.trim().toLowerCase();
  const city = $('filterCity').value;
  const minRooms = $('filterRooms').value ? Number($('filterRooms').value) : null;
  const sort = $('sortBy').value;

  let items = RAW.filter(p => {
    if (city && p.city !== city) return false;
    if (minRooms != null) {
      const top = p.roomsMax != null ? p.roomsMax : p.roomsMin;
      if (top == null || top < minRooms) return false;
    }
    if (q) {
      const hay = [p.name, p.address, p.city, p.zip].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const desc = sort.endsWith('_desc');
  const key = desc ? sort.slice(0, -5) : sort;
  items.sort((a, b) => {
    let r;
    if (key === 'name') {
      r = (a.name || '').localeCompare(b.name || '', 'da');
    } else {
      const av = sortVal(a, key), bv = sortVal(b, key);
      // nulls always last regardless of direction
      if (av == null && bv == null) r = 0;
      else if (av == null) return 1;
      else if (bv == null) return -1;
      else r = av - bv;
    }
    return desc ? -r : r;
  });

  // sync markers on map
  const visible = new Set(items.map(p => p.id));
  Object.entries(markers).forEach(([id, m]) => {
    const on = visible.has(Number(id));
    if (on && !map.hasLayer(m)) m.addTo(map);
    else if (!on && map.hasLayer(m)) map.removeLayer(m);
  });

  renderList(items);
}

function fitAll() {
  const pts = RAW.filter(p => p.lat != null && p.lng != null).map(p => [p.lat, p.lng]);
  if (pts.length) map.fitBounds(pts, { padding: [40, 40] });
}

['search', 'sortBy', 'filterCity', 'filterRooms'].forEach(id => {
  $(id).addEventListener('input', apply);
});
$('resetBtn').addEventListener('click', () => {
  $('search').value = ''; $('filterCity').value = ''; $('filterRooms').value = ''; $('sortBy').value = 'name';
  activeId = null;
  apply(); fitAll();
});

// init
Object.values(markers).forEach(m => m.addTo(map));
fitAll();
apply();
</script>
</body>
</html>
